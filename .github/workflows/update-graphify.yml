name: Update Graphify

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "graphify-out/**"
      - "graphify-corpus/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: graphify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-graphify:
    if: github.ref_name == 'main' || github.ref_name == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Graphify
        run: uv tool install graphifyy

      - name: Build Godot Graphify corpus
        run: python3 tools/build_graphify_corpus.py

      - name: Rebuild graph from curated corpus
        run: |
          rm -rf graphify-out graphify-corpus/graphify-out
          graphify graphify-corpus --code-only
          cd graphify-corpus
          graphify export html
          cd ..
          rm -rf graphify-corpus/graphify-out/cache
          mv graphify-corpus/graphify-out graphify-out

      - name: Remove generated cache
        run: rm -rf graphify-out/cache graphify-corpus/graphify-out/cache

      - name: Commit graph updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r --ignore-unmatch graphify-corpus/graphify-out
          git add graphify-corpus graphify-out .gitignore tools/build_graphify_corpus.py .github/workflows/update-graphify.yml
          if git diff --cached --quiet; then
            echo "Graphify is already up to date."
            exit 0
          fi
          git commit -m "chore: actualiza grafo de arquitectura"
          git push
